<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 彩虹渐变 -->
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="16%" stop-color="#feca57"/>
      <stop offset="33%" stop-color="#48dbfb"/>
      <stop offset="50%" stop-color="#ff9ff3"/>
      <stop offset="66%" stop-color="#54a0ff"/>
      <stop offset="83%" stop-color="#5f27cd"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>

    <!-- 霓虹发光 -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 强阴影 -->
    <filter id="strongShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ff9ff3" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- 深色背景 -->
  <rect width="800" height="200" fill="#0d1117" rx="12"/>

  <!-- ASCII Art 风格的 OfferCatcher -->
  <text x="400" y="100" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="26" fill="url(#rainbow)" filter="url(#neonGlow)">
    <tspan x="400" dy="0">   ____  _____  _____              _             _   </tspan>
    <tspan x="400" dy="28">  / __ \|  __ \|  __ \      /\   | |           | |  </tspan>
    <tspan x="400" dy="28"> | |  | | |__) | |__) |    /  \  | | _____  _ __| |_ </tspan>
    <tspan x="400" dy="28"> | |  | |  ___/|  ___/    / /\ \ | |/ / _ \| '__| __|</tspan>
    <tspan x="400" dy="28"> | |__| | |    | |       / ____ \|   &lt; (_) | |  | |_ </tspan>
    <tspan x="400" dy="28">  \____/|_|    |_|      /_/    \_\_|\_\___/|_|   \__|</tspan>
  </text>

  <!-- 装饰性星星 -->
  <text x="50" y="30" font-size="20" fill="#feca57">✨</text>
  <text x="750" y="30" font-size="20" fill="#ff6b6b">✨</text>
  <text x="30" y="180" font-size="16" fill="#48dbfb">⭐</text>
  <text x="770" y="180" font-size="16" fill="#ff9ff3">⭐</text>
</svg>